<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácor Palma Isabella</title>
   
   <link rel="icon" type="image/png" href="Recursos/img/LogoCapuRo.png">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
        }

        body {
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        header {
            padding: 30px;
            background-color: #e2dede;
            border-bottom: 2px solid #fda0ff;
        }

        h1 {
            color: #fff;
            text-transform: uppercase;
            margin: 0;
            text-shadow:
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #feb4f2,
                0 0 40px #f755f7,
                0 0 80px #ce22c0,
                0 0 90px #c022ce;
        }

        main {
            flex: 1;
            padding: 40px 20px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .semana {
            background-color: #ffffff;
            color: #333;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: left;
            border-left: 8px solid #f755dc;
            box-shadow: 0 4px 15px rgba(247, 85, 161, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .semana:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(242, 85, 247, 0.5);
        }

        .semana h3 {
            margin-top: 0;
            color: #7e22ce;
        }

        .pdf-container {
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background-color: rgb(249, 225, 242);
            border-top: 3px solid #f755d1;
        }

        footer span {
            font-weight: bold;
            color: #ce22cb;
        }

        footer img {
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        footer img:hover {
            transform: scale(1.3);
        }
    </style>
</head>
<body>

    <header>
        <h1>Bitácora Segunda y Tercera Unidad</h1>
    </header>

    <main>
        <div class="semana">
            <h3>Introducción Arduino</h3>
            <p>
                Análisis de la plataforma <b>Arduino</b> , componentes electrónicos como el microcontrolador y tipos de señales digitales y análogas.
            </p>
            <div class="pdf-container">
                <embed src="Introducción Arduino isa.pdf" type="application/pdf" width="100%" height="350px" />
            </div>
        </div>

        <div class="semana">
            <h3>Semana 2</h3>
            <p>En esta semana utilizamos la plataforma Tinkercard para la introducción de Arduino</p>
            <div class="pdf-container">
                <video width="100%" controls> 
                    <source src="recursos/Circuito semana 1 y 2.mp4" type="video/mp4">
                </video>

            </div>

            </div>
        </div>
    </main>

    <footer>
        <span>@isapaalma</span>
        <img src="https://www.capouilliez.edu.gt/assets/img/logo.png" alt="Logo Colegio" height="35">
    </footer>

</body>
</html>
